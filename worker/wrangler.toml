name = "samurai-blue-tracker"
main = "worker.js"
compatibility_date = "2024-11-01"

# 日本代表チームID（football-data.org）と YouTube 検索クエリ
[vars]
TEAM_ID = "765"
STREAM_QUERY = "日本代表 同時視聴 実況 ライブ"

# シークレットはコマンドで登録（このファイルには書かない）:
#   npx wrangler secret put FOOTBALL_TOKEN
#   npx wrangler secret put YOUTUBE_KEY
